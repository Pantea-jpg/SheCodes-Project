<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/generator.css" />
    <link rel="stylesheet" href="./css/general.css" />
    <link rel="stylesheet" href="./css/reset.css" />
    <title>generator</title>
  </head>
  <body>
    <header class="header">
      <div class="logo">
        <img src="./assets/logo1.png" alt="Music Match Logo" />
      </div>
      <nav>
        <a id="learn-more" href="#">meer informatie</a>
      </nav>
    </header>
    <main>
      <h1>Afspeellijst Generator</h1>
      <h2>stemming :</h2>
      <div class="mood-section">
        <button>😎 Chill</button>
        <button>🏃Energiek</button>
        <button>😴 Slaap</button>
        <button>💔 Verdrietig</button>
      </div>
      <h2>Genre :</h2>
      <div class="genre-section">
        <button>Hiphop</button>
        <button>Pop</button>
        <button>Jazz</button>
      </div>
      <div class="setting-section">
        <div class="setting">
          <label for="duration">Duur</label>
          <select id="duration">
            <option value="15">15 min ⏷</option>
            <option value="30">30 min ⏷</option>
            <option value="45">45 min ⏷</option>
            <option value="60">60 min ⏷</option>
          </select>
        </div>
        <div class="setting">
          <label for="tempo">Tempo</label>
          <input type="range" name="tempo" id="tempo" min="0" max="100" />
        </div>
        <div class="setting">
          <label for="popularity">Populariteit</label>
          <select name="popularity" id="popularity">
            <option value="Trending">Trending ⏷</option>
            <option value="Nieuw">Nieuw ⏷</option>
            <option value="Populair">Populair⏷</option>
          </select>
        </div>
      </div>
      <button type="button" class="playList-generate">
        Afspeellijst Genereren
      </button>
      <h2>Jouw afspeellijst:</h2>
      <section id="playlist">
        <div class="card">
          <div class="img">
            <div class="liked">♡</div>
          </div>
          <h2>naam van het nummer</h2>
          <p>Artiest</p>
          <button type="button" class="play-preview">Afspeel Preview</button>
        </div>
        <div class="card">
          <div class="img">
            <div class="liked">♡</div>
          </div>
          <h2>naam van het nummer</h2>
          <p>Artiest</p>
          <button type="button" class="play-preview">Preview toevoegen</button>
        </div>
        <div class="card">
          <div class="img">
            <div class="liked">♡</div>
          </div>
          <h2>naam van het nummer</h2>
          <p>Artiest</p>
          <button type="button" class="play-preview">
            Toevoegen aan collectie
          </button>
        </div>
      </section>
    </main>
  </body>
</html>
